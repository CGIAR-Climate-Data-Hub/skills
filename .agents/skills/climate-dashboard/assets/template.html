<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{--accent:#1d4ed8;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--r:.5rem;--gap:1rem}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);padding:1.5rem}
  h1{font-size:1.4rem;margin-bottom:.2rem}
  .subtitle{color:var(--muted);font-size:.85rem;margin-bottom:1.25rem}
  .filters{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem;background:var(--card);padding:.75rem 1rem;border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .filters label{font-size:.85rem;display:flex;align-items:center;gap:.4rem}
  select{border:1px solid #e2e8f0;border-radius:.25rem;padding:.2rem .5rem;font-size:.85rem}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:var(--gap);margin-bottom:var(--gap)}
  .kpi-card{background:var(--card);border-radius:var(--r);padding:1rem 1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .kpi-title{font-weight:600;font-size:.9rem;margin-bottom:.5rem}
  .kpi-row{display:flex;justify-content:space-between;font-size:.82rem;padding:.15rem 0;color:var(--muted)}
  .kpi-row strong{color:var(--text)}
  .chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:var(--gap);margin-bottom:var(--gap)}
  .chart-panel{background:var(--card);border-radius:var(--r);padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .chart-panel h3{font-size:.9rem;margin-bottom:.5rem}
  .chart-panel canvas{height:260px!important}
  .table-wrap{background:var(--card);border-radius:var(--r);padding:1rem;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th{background:var(--accent);color:#fff;padding:.4rem .6rem;text-align:left;cursor:pointer;user-select:none}
  td{padding:.35rem .6rem;border-bottom:1px solid #f1f5f9}
  tr:hover td{background:#f8fafc}
  .pagination{display:flex;gap:.4rem;margin-top:.75rem;align-items:center;font-size:.83rem}
  .pagination button{padding:.2rem .55rem;border:1px solid #e2e8f0;border-radius:.25rem;background:var(--card);cursor:pointer}
  .pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
  <h1>{{title}}</h1>
  <p class="subtitle">Interactive climate dashboard · open in any browser</p>
  
  <div class="filters">
    <!-- FILTERS_PLACEHOLDER -->
  </div>
  
  <div class="kpi-grid">
    <!-- KPIS_PLACEHOLDER -->
  </div>
  
  <div class="chart-grid">
    <!-- CHARTS_PLACEHOLDER -->
  </div>
  
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable(0)">Date</th>
          <!-- TABLE_HEADER_PLACEHOLDER -->
          <th onclick="sortTable(2)">Variable</th>
          <th onclick="sortTable(3)">Value</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- TABLE_ROWS_PLACEHOLDER -->
      </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

<script>
  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  const charts = [];
  const ALL_DATA = /* DATA_PLACEHOLDER */;

  function initCharts() {
    ALL_DATA.variables.forEach((varName, i) => {
      const meta  = ALL_DATA.meta[varName] || {label: varName, units: '–', color: '#a78bfa'};
      const cdata = ALL_DATA.chartData[varName];
      const ctype = ALL_DATA.plotType === 'seasonal_pattern' ? 'bar' : 'line';

      charts.push(new Chart(document.getElementById('chart_' + i), {
        type: ctype,
        data: {
          labels: cdata.labels,
          datasets: cdata.datasets.map(ds => ({
            ...ds,
            backgroundColor: hexToRgba(ds.borderColor || meta.color, 0.2),
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } } },
          scales: {
            y: { title: { display: true, text: meta.label + ' (' + meta.units + ')' } },
            x: { ticks: { maxRotation: 45 } }
          }
        }
      }));
    });
  }
  
  if (ALL_DATA && ALL_DATA.chartData) {
    initCharts();
  }

  const PAGE_SIZE = 50;
  let page = 0;
  const rows = Array.from(document.querySelectorAll('#tableBody tr'));
  
  function showPage(p) {
    rows.forEach((r,i) => r.style.display = (i>=p*PAGE_SIZE && i<(p+1)*PAGE_SIZE) ? '' : 'none');
    page = p;
    buildPager();
  }
  
  function buildPager() {
    const total = Math.ceil(rows.length / PAGE_SIZE);
    const el = document.getElementById('pagination');
    if (!el) return;
    el.innerHTML = '';
    for (let i=0; i<total; i++) {
      const b = document.createElement('button');
      b.textContent = i+1;
      if (i===page) b.className='active';
      b.onclick = ()=>showPage(i);
      el.appendChild(b);
    }
  }
  
  if (rows.length > 0) {
    showPage(0);
  }

  function sortTable(n) {
    const table = document.querySelector("table");
    let rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
    switching = true;
    dir = "asc";
    while (switching) {
      switching = false;
      rows = table.rows;
      for (i = 1; i < (rows.length - 1); i++) {
        shouldSwitch = false;
        x = rows[i].getElementsByTagName("TD")[n];
        y = rows[i + 1].getElementsByTagName("TD")[n];
        let valX = x.innerHTML.toLowerCase();
        let valY = y.innerHTML.toLowerCase();
        if (!isNaN(Number(valX)) && !isNaN(Number(valY))) {
          valX = Number(valX);
          valY = Number(valY);
        }
        if (dir == "asc") {
          if (valX > valY) {
            shouldSwitch = true;
            break;
          }
        } else if (dir == "desc") {
          if (valX < valY) {
            shouldSwitch = true;
            break;
          }
        }
      }
      if (shouldSwitch) {
        rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
        switching = true;
        switchcount++;
      } else {
        if (switchcount == 0 && dir == "asc") {
          dir = "desc";
          switching = true;
        }
      }
    }
    if (rows.length > 0) {
      showPage(0);
    }
  }
</script>
</body>
</html>
