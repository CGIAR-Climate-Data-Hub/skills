name: Validate Skills
on:
  pull_request:
    paths:
      - ".agents/skills/**"
  push:
    branches:
      - main
    paths:
      - ".agents/skills/**"

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install skill-validator
        run: |
          brew install agent-ecosystem/tap/skill-validator

      - name: Validate skills
        run: |
          skill-validator check --strict --emit-annotations .agents/skills/
          skill-validator check --strict -o markdown .agents/skills/ >> "$GITHUB_STEP_SUMMARY"
