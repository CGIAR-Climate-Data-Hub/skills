name: Validate Skills
on:
  pull_request:
    paths:
      - ".agents/skills/**"
  push:
    branches:
      - main
    paths:
      - ".agents/skills/**"

  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install skill-validator
        run: |
          brew install agent-ecosystem/tap/skill-validator

      - name: Validate skills
        run: |
          set +e
          skill-validator check --emit-annotations .agents/skills/
          code=$?
          skill-validator check -o markdown .agents/skills/ >> "$GITHUB_STEP_SUMMARY" || true
          # exit 0 = pass, exit 2 = warnings only (don't fail), anything else = real error
          if [ "$code" -eq 0 ] || [ "$code" -eq 2 ]; then
            exit 0
          fi
          exit "$code"
